platforms:
  instagram:
    apify_actor: "apify/instagram-scraper"
    max_posts_per_account: 50
  facebook:
    apify_actor: "apify/facebook-posts-scraper"
    max_posts_per_account: 50
  xiaohongshu:
    apify_actor: "epctex/xiaohongshu-scraper"
    max_posts_per_account: 30
  x_twitter:
    apify_actor: "apidojo/twitter-scraper-v2"
    max_posts_per_account: 50
  reddit:
    apify_actor: "trudax/reddit-scraper"
    max_posts_per_account: 30

scoring:
  weights:
    likes: 1.0
    comments: 3.0
    shares: 5.0
    saves: 4.0
  min_score_threshold: 0.5
  velocity_bonus_hours: 24
  velocity_bonus_multiplier: 1.5

# SQLite for local development (no server needed):
database:
  url: "sqlite:///./watcheye.db"
# For PostgreSQL, use:
#   url: "postgresql://localhost:5432/watcheye"

media:
  download: true
  storage_path: "./media"

apify:
  token: "${APIFY_TOKEN}"

clone:
  gemini_api_key: "${GEMINI_API_KEY}"
  model: "gemini-3.1-flash-lite-preview"
  image_model: "gemini-3.1-flash-image-preview"
  brand_name: "Doughnut"
  brand_description: "Hong Kong backpack brand (est. 2010). Functional, stylish bags for urban commuters and travelers."
  max_briefs_per_source: 3
